<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BizPage demos</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #171717;
        background: #f7f5f0;
      }

      body {
        margin: 0;
      }

      main {
        width: min(720px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0;
        font-size: 40px;
        line-height: 1.1;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: #5f5a52;
        line-height: 1.7;
      }

      ul {
        display: grid;
        gap: 12px;
        margin: 32px 0 0;
        padding: 0;
        list-style: none;
      }

      a {
        display: block;
        border: 1px solid #ddd6ca;
        border-radius: 8px;
        background: #fff;
        padding: 18px 20px;
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        border-color: #b8965f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BizPage demos</h1>
      <p>Lekkie statyczne eksporty demo dla lokalnych firm.</p>
      <ul>
        <li>
          <a href="./studio-fryzur-filipiak/">Studio Fryzur Filipiak</a>
        </li>
      </ul>
    </main>
  </body>
</html>
