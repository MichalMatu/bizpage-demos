<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive,noimageindex" />
    <title>Demo dostępne z linku</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #171717;
        background: #f7f5f0;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 40px 20px;
      }

      section {
        width: min(560px, 100%);
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.12;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: #5f5a52;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Demo dostępne z bezpośredniego linku.</h1>
        <p>
          Ten adres nie zawiera publicznej listy stron. Otwórz indywidualny
          link otrzymany w wiadomości.
        </p>
      </section>
    </main>
  </body>
</html>
